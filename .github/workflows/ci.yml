name: PAPA Lab CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install linting tools
        run: pip install flake8 black isort
      - name: Run flake8
        run: flake8 . --count --exit-zero --max-line-length=127
      - name: Run black
        run: black --check . --line-length=127 || true
      - name: Run isort
        run: isort --check-only . || true

  test:
    name: Tests & Coverage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: List test files
        run: find . -name "test_*.py" -o -name "*_test.py"
      - name: Run pytest
        run: python -m pytest tests/test_papa_lab.py -v --tb=short || true
      - name: Generate coverage
        run: python -m pytest tests/test_papa_lab.py --cov=. --cov-report=xml || true
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit
        run: pip-audit --requirements requirements.txt --desc || true
      - name: Verify requirements.txt
        run: pip install -r requirements.txt --dry-run

  notify:
    name: Notify
    runs-on: ubuntu-22.04
    needs: [lint, test, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Pipeline Status: ${{ job.status }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          if [ "${{ needs.test.result }}" == "failure" ]; then
            exit 1
          fi
