name: PAPA Lab CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================================================
  # Job 1: Lint & Code Quality
  # ========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8 black

      - name: flake8 (errors only)
        run: flake8 app.py scripts/ --count --select=E9,F63,F7,F82 --show-source || true

      - name: flake8 (full report, non-blocking)
        run: flake8 . --count --exit-zero --max-line-length=127 --statistics || true

      - name: black format check (non-blocking)
        run: black --check . --line-length=127 || true

  # ========================================================================
  # Job 2: Tests & Coverage
  # ========================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CI dependencies (fast — no torch/chromadb)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest pytest-cov pyyaml

      - name: Verify test files present
        run: |
          ls -la tests/
          echo "test_ci.py:      $(wc -l < tests/test_ci.py) lines"
          echo "test_papa_lab.py: $(wc -l < tests/test_papa_lab.py) lines"

      - name: Run CI test suite
        run: |
          python -m pytest tests/test_ci.py -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml \
            -p no:warnings

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ========================================================================
  # Job 3: Security Scan — Dependency & SAST gates (PM-11)
  # Blocking on CRITICAL CVEs and HIGH SAST findings.
  # CONSTRAINT: SC-01 through SC-08 are intentional teaching features
  # per SSPP §4. Bandit findings tied to those paths are NOT remediated.
  # ========================================================================
  security-scan-deps:
    name: Security Scan — Deps & SAST
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install pip-audit safety bandit

      - name: Run pip-audit (CVE check)
        run: |
          pip-audit \
            --desc \
            --format json \
            --output pip-audit-report.json \
            -r requirements-pinned.txt || true
          python3 -c "
          import json, sys
          try:
              data = json.load(open('pip-audit-report.json'))
              deps = data.get('dependencies', [])
              critical = [v for d in deps for v in d.get('vulns', [])
                          if any(s.get('severity','').upper() == 'CRITICAL'
                                 for s in v.get('aliases', [{}]))]
              if critical:
                  print(f'BLOCKING: {len(critical)} CRITICAL CVE(s) found.')
                  for v in critical[:5]:
                      print(f'  {v.get(\"id\",\"?\")} in {d.get(\"name\",\"?\")}')
                  sys.exit(1)
              print(f'pip-audit: no CRITICAL CVEs in {len(deps)} dependencies.')
          except Exception as e:
              print(f'pip-audit parse error: {e}')
          "

      - name: Run safety (alternative CVE check)
        run: |
          safety check \
            --json \
            --file requirements-pinned.txt \
            --output safety-report.json || true
          python3 -c "
          import json, sys
          try:
              data = json.load(open('safety-report.json'))
              vulns = data.get('vulnerabilities', [])
              critical = [v for v in vulns
                          if str(v.get('severity','')).upper() == 'CRITICAL']
              if critical:
                  print(f'BLOCKING: {len(critical)} CRITICAL finding(s) from safety.')
                  sys.exit(1)
              print(f'safety: no CRITICAL findings.')
          except Exception as e:
              print(f'safety parse warning: {e}')
          "

      - name: Run bandit (SAST)
        run: |
          bandit -r app.py scripts/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --exit-zero
          python3 -c "
          import json, sys
          data = json.load(open('bandit-report.json'))
          results = data.get('results', [])
          high = [r for r in results if r.get('issue_severity','') == 'HIGH']
          if high:
              print(f'BLOCKING: {len(high)} HIGH severity bandit finding(s).')
              for r in high[:5]:
                  print(f'  [{r[\"issue_severity\"]}] {r[\"issue_text\"]} — {r[\"filename\"]}:{r[\"line_number\"]}')
              sys.exit(1)
          medium = [r for r in results if r.get('issue_severity','') == 'MEDIUM']
          print(f'bandit: 0 HIGH findings. {len(medium)} MEDIUM (non-blocking).')
          "

      - name: Archive security reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-scan-reports
          path: |
            bandit-report.json
            pip-audit-report.json
            safety-report.json

  # ========================================================================
  # Job 6: Secret Detection (PM-12)
  # Uses detect-secrets with an audited baseline so intentional SC-04
  # fake credentials (keys.md, rag_exfil demo content) never block CI.
  # ========================================================================
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'requirements.*\.txt$' \
            --exclude-files '.*\.md$' \
            --exclude-files 'tests/.*' \
            --exclude-files '\.git/.*'

      - name: Audit baseline (fail on unaudited)
        run: detect-secrets audit .secrets.baseline --report --fail-on-unaudited

      - name: Upload baseline as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: secrets-scan-report
          path: .secrets.baseline

  # ========================================================================
  # Job 4: Docker Build
  # ========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t papa-lab:latest .

  # ========================================================================
  # Job 5: Notify / Results Summary
  # ========================================================================
  notify:
    name: Results Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, security-scan-deps, secret-scan]
    steps:
      - name: Pipeline Status
        run: |
          echo "==============================="
          echo "  PAPA Lab CI/CD Pipeline"
          echo "==============================="
          echo "  Lint:          ${{ needs.lint.result }}"
          echo "  Test:          ${{ needs.test.result }}"
          echo "  Security Scan: ${{ needs.security-scan-deps.result }}"
          echo "==============================="
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "  STATUS: PASS"
          else
            echo "  STATUS: FAIL — check test job"
            exit 1
          fi
