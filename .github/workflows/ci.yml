name: PAPA Lab CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ========================================================================
  # Job 1: Lint & Code Quality
  # ========================================================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8 black

      - name: flake8 (errors only)
        run: flake8 app.py scripts/ --count --select=E9,F63,F7,F82 --show-source || true

      - name: flake8 (full report, non-blocking)
        run: flake8 . --count --exit-zero --max-line-length=127 --statistics || true

      - name: black format check (non-blocking)
        run: black --check . --line-length=127 || true

  # ========================================================================
  # Job 2: Tests & Coverage
  # ========================================================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CI dependencies (fast — no torch/chromadb)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install pytest pytest-cov pyyaml

      - name: Verify test files present
        run: |
          ls -la tests/
          echo "test_ci.py:      $(wc -l < tests/test_ci.py) lines"
          echo "test_papa_lab.py: $(wc -l < tests/test_papa_lab.py) lines"

      - name: Run CI test suite
        run: |
          python -m pytest tests/test_ci.py -v --tb=short \
            --cov=. --cov-report=term-missing --cov-report=xml \
            -p no:warnings

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ========================================================================
  # Job 3: Security Scan — Dependency & SAST gates (PM-11)
  # Blocking on CRITICAL CVEs and HIGH SAST findings.
  # CONSTRAINT: SC-01 through SC-08 are intentional teaching features
  # per SSPP §4. Bandit findings tied to those paths are NOT remediated.
  # ========================================================================
  security-scan-deps:
    name: Security Scan — Deps & SAST
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: pip install pip-audit safety bandit

      - name: Run pip-audit (CVE check)
        run: |
          pip-audit \
            --desc \
            --format json \
            --output pip-audit-report.json \
            -r requirements-pinned.txt || true
          python3 -c "
          import json, sys
          try:
              data = json.load(open('pip-audit-report.json'))
              deps = data.get('dependencies', [])
              critical = [v for d in deps for v in d.get('vulns', [])
                          if any(s.get('severity','').upper() == 'CRITICAL'
                                 for s in v.get('aliases', [{}]))]
              if critical:
                  print(f'BLOCKING: {len(critical)} CRITICAL CVE(s) found.')
                  for v in critical[:5]:
                      print(f'  {v.get(\"id\",\"?\")} in {d.get(\"name\",\"?\")}')
                  sys.exit(1)
              print(f'pip-audit: no CRITICAL CVEs in {len(deps)} dependencies.')
          except Exception as e:
              print(f'pip-audit parse error: {e}')
          "

      - name: Run safety (alternative CVE check)
        run: |
          safety check \
            --json \
            --file requirements-pinned.txt \
            --output safety-report.json || true
          python3 -c "
          import json, sys
          try:
              data = json.load(open('safety-report.json'))
              vulns = data.get('vulnerabilities', [])
              critical = [v for v in vulns
                          if str(v.get('severity','')).upper() == 'CRITICAL']
              if critical:
                  print(f'BLOCKING: {len(critical)} CRITICAL finding(s) from safety.')
                  sys.exit(1)
              print(f'safety: no CRITICAL findings.')
          except Exception as e:
              print(f'safety parse warning: {e}')
          "

      - name: Run bandit (SAST)
        run: |
          bandit -r app.py scripts/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --exit-zero
          python3 -c "
          import json, sys
          data = json.load(open('bandit-report.json'))
          results = data.get('results', [])
          high = [r for r in results if r.get('issue_severity','') == 'HIGH']
          if high:
              print(f'BLOCKING: {len(high)} HIGH severity bandit finding(s).')
              for r in high[:5]:
                  print(f'  [{r[\"issue_severity\"]}] {r[\"issue_text\"]} — {r[\"filename\"]}:{r[\"line_number\"]}')
              sys.exit(1)
          medium = [r for r in results if r.get('issue_severity','') == 'MEDIUM']
          print(f'bandit: 0 HIGH findings. {len(medium)} MEDIUM (non-blocking).')
          "

      - name: Archive security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            bandit-report.json
            pip-audit-report.json
            safety-report.json

  # ========================================================================
  # Job 8: DAST — OWASP ZAP Baseline (PM-07)
  # Runs on push to main only (not on PRs — app startup is slow).
  # .zap/rules.tsv suppresses alerts for SC-01 through SC-08 intentional
  # teaching features so they never appear as DAST findings.
  # ========================================================================
  dast:
    name: DAST — OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pinned.txt

      - name: Start PAPA Lab (no Ollama)
        run: |
          export AI_SECURITY_LEVEL=3
          export OLLAMA_BASE_URL=http://localhost:11434
          export DATABASE_PATH=/tmp/test_zap.db
          python app.py &
          echo $! > app.pid
          sleep 8
          curl -sf http://localhost:5001/ > /dev/null && echo "App is up" || echo "App start failed (continuing)"

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:5001'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -T 120'
          fail_action: false
          issue_title: 'ZAP Scan Report'
        continue-on-error: true

      - name: Fail on HIGH+ findings
        run: |
          python3 -c "
          import json, sys, os
          try:
              report = json.load(open('report_json.json'))
              high = [a for site in report.get('site', [])
                        for a in site.get('alerts', [])
                        if int(a.get('riskcode', 0)) >= 3]
              if high:
                  print(f'{len(high)} HIGH/CRITICAL DAST finding(s):')
                  for a in high[:5]:
                      print(f'  [{a.get(\"riskdesc\",\"?\")}] {a.get(\"alert\",\"\")}')
                  print('NOTE: Review findings — some may be intentional SC-0X features already in .zap/rules.tsv')
                  sys.exit(1)
              else:
                  print('ZAP: no HIGH+ findings.')
          except FileNotFoundError:
              print('ZAP report not found — scan may not have completed.')
          " || true

      - name: Stop app
        if: always()
        run: kill $(cat app.pid) 2>/dev/null || true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            report_html.html
            report_json.json

  # ========================================================================
  # Job 7: SBOM Generation + Build Provenance (PM-09)
  # ========================================================================
  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: |
          cyclonedx-py requirements requirements-pinned.txt \
            --output-format json \
            --output-file sbom-cyclonedx.json

      - name: Validate and summarise SBOM
        run: |
          python3 -c "
          import json
          sbom = json.load(open('sbom-cyclonedx.json'))
          n = len(sbom.get('components', []))
          print(f'SBOM: {n} components, format={sbom.get(\"bomFormat\")}, spec={sbom.get(\"specVersion\")}')
          "

      - name: Capture build provenance
        run: |
          python3 -c "
          import json, os, subprocess
          from datetime import datetime, timezone
          sha = subprocess.check_output(['git','rev-parse','HEAD']).decode().strip()
          provenance = {
            'commit': sha,
            'timestamp': datetime.now(timezone.utc).isoformat(),
            'workflow_run': os.environ.get('GITHUB_RUN_ID','local'),
            'runner_os': os.environ.get('RUNNER_OS','macOS'),
            'python_version': '3.11',
            'requirements_sha256': subprocess.check_output(
              ['sha256sum','requirements-pinned.txt']).decode().split()[0]
          }
          json.dump(provenance, open('build-provenance.json','w'), indent=2)
          print('Provenance:', json.dumps(provenance, indent=2))
          "

      - name: Upload SBOM and provenance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-and-provenance
          path: |
            sbom-cyclonedx.json
            build-provenance.json

  # ========================================================================
  # Job 6: Secret Detection (PM-12)
  # Uses detect-secrets with an audited baseline so intentional SC-04
  # fake credentials (keys.md, rag_exfil demo content) never block CI.
  # ========================================================================
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'requirements.*\.txt$' \
            --exclude-files '.*\.md$' \
            --exclude-files '.*\.baseline$' \
            --exclude-files 'tests/.*' \
            --exclude-files '\.git/.*'

      - name: Audit baseline (fail on unaudited)
        run: detect-secrets audit .secrets.baseline --report --fail-on-unaudited

      - name: Upload baseline as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: .secrets.baseline

  # ========================================================================
  # Job 4: Docker Build
  # ========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t papa-lab:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'papa-lab:latest'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Enforce no-CRITICAL container policy
        run: |
          python3 -c "
          import json, sys
          try:
              data = json.load(open('trivy-results.json'))
              critical = [v for r in data.get('Results', [])
                            for v in r.get('Vulnerabilities', [])
                            if v.get('Severity') == 'CRITICAL']
              if critical:
                  print(f'BLOCKING: {len(critical)} CRITICAL container CVE(s).')
                  for v in critical[:5]:
                      print(f'  {v[\"VulnerabilityID\"]}: {v.get(\"PkgName\",\"\")} {v.get(\"InstalledVersion\",\"\")}')
                  sys.exit(1)
              print(f'Trivy: no CRITICAL CVEs in container image.')
          except FileNotFoundError:
              print('Trivy: no results file found — scan may not have run.')
          "

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-results.json

  # ========================================================================
  # Job 5: Notify / Results Summary
  # ========================================================================
  notify:
    name: Results Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, security-scan-deps, secret-scan]
    steps:
      - name: Pipeline Status
        run: |
          echo "==============================="
          echo "  PAPA Lab CI/CD Pipeline"
          echo "==============================="
          echo "  Lint:          ${{ needs.lint.result }}"
          echo "  Test:          ${{ needs.test.result }}"
          echo "  Security Scan: ${{ needs.security-scan-deps.result }}"
          echo "==============================="
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "  STATUS: PASS"
          else
            echo "  STATUS: FAIL — check test job"
            exit 1
          fi
